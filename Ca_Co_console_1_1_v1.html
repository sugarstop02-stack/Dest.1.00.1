<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CALLSIGN // Pipeline Console</title>
<style>
  @font-face {
    font-family: 'sysfont';
    src: local('Courier New');
  }
  :root{
    --bg: #071009;
    --panel: #0c1a10;
    --line: #163c22;
    --green: #4fe37b;
    --green-dim: #276b3e;
    --green-bright: #9dffb8;
    --amber: #e3b74f;
    --red: #e35f4f;
    --text: #bfeccb;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%;
    background:var(--bg);
    color:var(--text);
    font-family: 'Courier New', Courier, monospace;
    overflow:hidden;
  }
  #scan{
    position:fixed; inset:0; pointer-events:none; z-index:50;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,20,8,0.35) 3px
    );
    mix-blend-mode:multiply;
  }
  #vignette{
    position:fixed; inset:0; pointer-events:none; z-index:49;
    box-shadow: inset 0 0 160px rgba(0,0,0,0.85);
  }
  .wrap{
    height:100%;
    display:flex;
    flex-direction:column;
  }
  header{
    padding:14px 22px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    letter-spacing:2px;
  }
  header .title{
    font-size:14px;
    color:var(--green-bright);
    text-shadow:0 0 6px rgba(79,227,123,0.6);
  }
  header .sub{
    font-size:11px;
    color:var(--green-dim);
  }
  .board{
    flex:1;
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap:1px;
    background:var(--line);
    min-height:0;
  }
  .col{
    background:var(--bg);
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .col-head{
    padding:10px 16px;
    font-size:11px;
    letter-spacing:3px;
    color:var(--green-dim);
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
  }
  .col-head b{ color:var(--green); }
  .col-body{
    flex:1;
    overflow-y:auto;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .col-body::-webkit-scrollbar{ width:6px; }
  .col-body::-webkit-scrollbar-thumb{ background:var(--line); }

  /* LEFT: dropzone + queue */
  #dropzone{
    border:1px dashed var(--green-dim);
    padding:22px 14px;
    text-align:center;
    font-size:11px;
    color:var(--green-dim);
    cursor:pointer;
    transition: all .15s ease;
  }
  #dropzone.hot{
    border-color:var(--green);
    color:var(--green-bright);
    background:rgba(79,227,123,0.05);
    box-shadow:0 0 12px rgba(79,227,123,0.15) inset;
  }
  #fileInput{ display:none; }

  .card{
    border:1px solid var(--line);
    background:var(--panel);
    padding:10px 12px;
    font-size:12px;
    cursor:default;
  }
  .card .fname{
    color:var(--green-bright);
    word-break:break-all;
    margin-bottom:4px;
  }
  .card .meta{
    font-size:10px;
    color:var(--green-dim);
  }
  .card button{
    margin-top:8px;
    background:none;
    border:1px solid var(--green-dim);
    color:var(--green);
    font-family:inherit;
    font-size:10px;
    letter-spacing:1px;
    padding:5px 10px;
    cursor:pointer;
  }
  .card button:hover{ background:var(--green-dim); color:#08130b; }

  /* CENTER: processing form */
  .proc-empty{
    color:var(--green-dim);
    font-size:11px;
    margin-top:20px;
    text-align:center;
    line-height:1.6;
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:4px;
    margin-bottom:12px;
  }
  .field label{
    font-size:10px;
    letter-spacing:2px;
    color:var(--green-dim);
  }
  .field input{
    background:#08130b;
    border:1px solid var(--line);
    color:var(--green-bright);
    font-family:inherit;
    font-size:13px;
    padding:7px 8px;
    outline:none;
  }
  .field input:focus{ border-color:var(--green); }
  .field .hint{ font-size:9px; color:var(--green-dim); }

  .row2{ display:flex; gap:10px; }
  .row2 .field{ flex:1; }

  .preview{
    margin:14px 0;
    padding:10px 12px;
    border:1px solid var(--green-dim);
    background:#08130b;
    font-size:13px;
    color:var(--green-bright);
    letter-spacing:0.5px;
    word-break:break-all;
    min-height:20px;
  }
  .preview .cursor{
    display:inline-block;
    width:7px; height:13px;
    background:var(--green-bright);
    vertical-align:middle;
    margin-left:2px;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  .confirmBtn{
    width:100%;
    padding:10px;
    background:var(--green-dim);
    border:1px solid var(--green);
    color:#08130b;
    font-family:inherit;
    font-weight:bold;
    letter-spacing:2px;
    font-size:11px;
    cursor:pointer;
  }
  .confirmBtn:hover{ background:var(--green); }
  .confirmBtn:disabled{
    background:#132318; color:var(--green-dim); border-color:var(--line); cursor:not-allowed;
  }

  .statusLine{
    font-size:10px; color:var(--amber);
    min-height:14px;
    margin-top:6px;
  }

  /* RIGHT: done stack */
  .done-card{
    border:1px solid var(--green-dim);
    background:var(--panel);
    padding:10px 12px;
    font-size:12px;
  }
  .done-card .fname{
    color:var(--green-bright);
    word-break:break-all;
    margin-bottom:6px;
    font-size:12px;
  }
  .done-card .oldname{
    font-size:10px;
    color:var(--green-dim);
    margin-bottom:8px;
    word-break:break-all;
  }
  .done-card a{
    display:inline-block;
    font-size:10px;
    letter-spacing:1px;
    color:#08130b;
    background:var(--green);
    padding:5px 10px;
    text-decoration:none;
  }
  .done-card a:hover{ background:var(--green-bright); }
  .done-card .reminder{
    margin-top:8px;
    font-size:9px;
    color:var(--red);
    letter-spacing:0.5px;
  }

  footer{
    border-top:1px solid var(--line);
    padding:8px 22px;
    font-size:10px;
    color:var(--green-dim);
    display:flex;
    justify-content:space-between;
  }

  @media (max-width: 820px){
    .board{ grid-template-columns:1fr; grid-template-rows: auto auto auto; overflow-y:auto; }
    .col{ min-height:220px; }
  }
</style>
</head>
<body>
<div id="scan"></div>
<div id="vignette"></div>
<div class="wrap">
  <header>
    <div class="title">CALLSIGN // PIPELINE CONSOLE</div>
    <div class="sub" id="clock">STANDBY</div>
  </header>

  <div class="board">
    <!-- LEFT: UNFINISHED / QUEUE -->
    <div class="col">
      <div class="col-head">LEFT · UNFINISHED <b id="countL">0</b></div>
      <div class="col-body" id="colL">
        <div id="dropzone">
          DRAG FILE HERE<br>OR CLICK TO SELECT
          <input type="file" id="fileInput" multiple>
        </div>
      </div>
    </div>

    <!-- CENTER: PROCESSING -->
    <div class="col">
      <div class="col-head">CENTER · PROCESSING <b id="countC">0</b></div>
      <div class="col-body" id="colC">
        <div class="proc-empty" id="procEmpty">// SELECT A FILE FROM<br>LEFT QUEUE TO BEGIN<br>ANALYSIS //</div>
      </div>
    </div>

    <!-- RIGHT: DONE -->
    <div class="col">
      <div class="col-head">RIGHT · READY <b id="countR">0</b></div>
      <div class="col-body" id="colR"></div>
    </div>
  </div>

  <footer>
    <span>Aa.Bb.description.number.version</span>
    <span id="tally">0 QUEUED · 0 DONE</span>
  </footer>
</div>

<script>
const state = {
  queue: [],   // {id, file}
  active: null, // {id, file, guess:{Aa,Bb,desc,number,version}}
  done: []     // {id, oldName, newName, url}
};

let idCounter = 1;

const el = {
  dropzone: document.getElementById('dropzone'),
  fileInput: document.getElementById('fileInput'),
  colL: document.getElementById('colL'),
  colC: document.getElementById('colC'),
  colR: document.getElementById('colR'),
  procEmpty: document.getElementById('procEmpty'),
  countL: document.getElementById('countL'),
  countC: document.getElementById('countC'),
  countR: document.getElementById('countR'),
  tally: document.getElementById('tally'),
  clock: document.getElementById('clock'),
};

// ---- clock ----
function tickClock(){
  const d = new Date();
  el.clock.textContent = d.toTimeString().slice(0,8) + ' :: LIVE';
}
setInterval(tickClock, 1000);
tickClock();

// ---- drag & drop ----
['dragenter','dragover'].forEach(evt=>{
  el.dropzone.addEventListener(evt, e=>{
    e.preventDefault(); e.stopPropagation();
    el.dropzone.classList.add('hot');
  });
});
['dragleave','drop'].forEach(evt=>{
  el.dropzone.addEventListener(evt, e=>{
    e.preventDefault(); e.stopPropagation();
    el.dropzone.classList.remove('hot');
  });
});
el.dropzone.addEventListener('drop', e=>{
  const files = Array.from(e.dataTransfer.files || []);
  files.forEach(addToQueue);
});
el.dropzone.addEventListener('click', ()=> el.fileInput.click());
el.fileInput.addEventListener('change', e=>{
  Array.from(e.target.files || []).forEach(addToQueue);
  el.fileInput.value = '';
});

function addToQueue(file){
  state.queue.push({ id: idCounter++, file });
  renderLeft();
  renderTally();
}

// ---- LEFT render ----
function renderLeft(){
  // clear all cards but keep dropzone
  Array.from(el.colL.querySelectorAll('.card')).forEach(c=>c.remove());
  state.queue.forEach(item=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="fname">${escapeHtml(item.file.name)}</div>
      <div class="meta">${formatBytes(item.file.size)} · ${item.file.type || 'unknown type'}</div>
      <button data-id="${item.id}">ANALYZE →</button>
    `;
    card.querySelector('button').addEventListener('click', ()=> beginProcessing(item.id));
    el.colL.appendChild(card);
  });
  el.countL.textContent = state.queue.length;
}

// ---- move to CENTER ----
function beginProcessing(id){
  if(state.active){
    // push current active back to queue front if user switches mid-edit
    state.queue.unshift(state.active);
  }
  const idx = state.queue.findIndex(i=>i.id===id);
  const item = state.queue.splice(idx,1)[0];
  const guess = guessCallsign(item.file.name);
  state.active = { ...item, guess };
  renderLeft();
  renderCenter();
  renderTally();
}

// ---- guessing heuristic ----
const SUBJECT_MAP = [
  { test: t => /image\//.test(t), code: 'Im' },
  { test: t => /video\//.test(t), code: 'Vi' },
  { test: t => /audio\//.test(t), code: 'Au' },
  { test: t => /pdf/.test(t), code: 'Do' },
  { test: t => /word|officedocument\.word/.test(t), code: 'Do' },
  { test: t => /sheet|excel|csv/.test(t), code: 'Da' },
  { test: t => /zip|compressed|x-7z|x-rar/.test(t), code: 'Ar' },
  { test: t => /json|javascript|html|css|text\/x-python/.test(t), code: 'Co' },
];

function toCallCase(str){
  const clean = (str || 'xx').replace(/[^a-zA-Z]/g,'');
  const a = (clean[0] || 'x').toUpperCase();
  const b = (clean[1] || 'x').toLowerCase();
  return a + b;
}

function guessCallsign(filename){
  const dot = filename.lastIndexOf('.');
  const base = dot > 0 ? filename.slice(0, dot) : filename;
  const ext = dot > 0 ? filename.slice(dot+1).toLowerCase() : '';

  // split on common separators
  const words = base.split(/[\s_\-.]+/).filter(Boolean);
  const firstWord = words[0] || base;
  const descWord = (words[1] || words[0] || 'file').toLowerCase().replace(/[^a-z0-9]/g,'') || 'file';

  const Aa = toCallCase(firstWord);

  let subjCode = 'Ge'; // General, fallback
  const mimeGuess = guessMimeFromExt(ext);
  const match = SUBJECT_MAP.find(m => m.test(mimeGuess));
  if(match) subjCode = match.code;
  const Bb = subjCode[0].toUpperCase() + subjCode.slice(1).toLowerCase();

  return {
    Aa, Bb,
    desc: descWord,
    number: '1.1',
    version: 'v1',
    ext
  };
}

function guessMimeFromExt(ext){
  const map = {
    png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg', gif:'image/gif', webp:'image/webp', svg:'image/svg',
    mp4:'video/mp4', mov:'video/quicktime', webm:'video/webm',
    mp3:'audio/mpeg', wav:'audio/wav', ogg:'audio/ogg',
    pdf:'application/pdf',
    doc:'application/msword', docx:'application/vnd.openxmlformats-officedocument.wordprocessingml',
    xls:'application/excel', xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml', csv:'text/csv',
    zip:'application/zip', rar:'application/x-rar', '7z':'application/x-7z',
    json:'application/json', js:'application/javascript', html:'text/html', css:'text/css', py:'text/x-python'
  };
  return map[ext] || '';
}

// ---- CENTER render ----
function renderCenter(){
  el.colC.innerHTML = '';
  el.countC.textContent = state.active ? 1 : 0;

  if(!state.active){
    el.colC.appendChild(el.procEmpty);
    return;
  }

  const g = state.active.guess;

  const container = document.createElement('div');
  container.innerHTML = `
    <div style="font-size:10px;color:var(--green-dim);margin-bottom:10px;word-break:break-all;">
      SOURCE: ${escapeHtml(state.active.file.name)}
    </div>
    <div class="row2">
      <div class="field">
        <label>Aa · NAME</label>
        <input id="f_Aa" maxlength="2" value="${g.Aa}">
      </div>
      <div class="field">
        <label>Bb · SUBJECT</label>
        <input id="f_Bb" maxlength="2" value="${g.Bb}">
      </div>
    </div>
    <div class="field">
      <label>DESCRIPTION</label>
      <input id="f_desc" value="${g.desc}">
      <span class="hint">single word, lowercase preferred</span>
    </div>
    <div class="row2">
      <div class="field">
        <label>NUMBER</label>
        <input id="f_number" value="${g.number}">
      </div>
      <div class="field">
        <label>VERSION</label>
        <input id="f_version" value="${g.version}">
      </div>
    </div>
    <div class="preview" id="previewLine"></div>
    <button class="confirmBtn" id="confirmBtn">CONFIRM &amp; SEND TO RIGHT →</button>
    <div class="statusLine" id="statusLine"></div>
  `;
  el.colC.appendChild(container);

  const inputs = ['f_Aa','f_Bb','f_desc','f_number','f_version'].map(id=>document.getElementById(id));
  inputs.forEach(inp => inp.addEventListener('input', updatePreview));
  document.getElementById('confirmBtn').addEventListener('click', confirmActive);

  updatePreview();
}

function currentAssembledName(){
  const Aa = document.getElementById('f_Aa').value.trim() || 'Xx';
  const Bb = document.getElementById('f_Bb').value.trim() || 'Xx';
  const desc = (document.getElementById('f_desc').value.trim() || 'file').replace(/\s+/g,'');
  const number = document.getElementById('f_number').value.trim() || '1.1';
  const version = document.getElementById('f_version').value.trim() || 'v1';
  const ext = state.active.guess.ext;
  const base = [Aa, Bb, desc, number, version].join('.');
  return ext ? `${base}.${ext}` : base;
}

function updatePreview(){
  const previewLine = document.getElementById('previewLine');
  const name = currentAssembledName();
  previewLine.innerHTML = escapeHtml(name) + '<span class="cursor"></span>';
}

function confirmActive(){
  const newName = currentAssembledName();
  const item = state.active;
  const url = URL.createObjectURL(item.file);

  state.done.unshift({
    id: item.id,
    oldName: item.file.name,
    newName,
    url
  });

  state.active = null;
  renderCenter();
  renderRight();
  renderTally();

  // auto-trigger download
  const a = document.createElement('a');
  a.href = url;
  a.download = newName;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

// ---- RIGHT render ----
function renderRight(){
  el.colR.innerHTML = '';
  state.done.forEach(d=>{
    const card = document.createElement('div');
    card.className = 'done-card';
    card.innerHTML = `
      <div class="fname">${escapeHtml(d.newName)}</div>
      <div class="oldname">was: ${escapeHtml(d.oldName)}</div>
      <a href="${d.url}" download="${escapeHtml(d.newName)}">↓ DOWNLOAD AGAIN</a>
      <div class="reminder">DELETE ORIGINAL FROM DOWNLOADS MANUALLY</div>
    `;
    el.colR.appendChild(card);
  });
  el.countR.textContent = state.done.length;
}

function renderTally(){
  el.tally.textContent = `${state.queue.length + (state.active?1:0)} QUEUED · ${state.done.length} DONE`;
}

function formatBytes(n){
  if(n < 1024) return n + ' B';
  if(n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(1) + ' MB';
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

renderLeft();
renderCenter();
renderRight();
renderTally();
</script>
</body>
</html>
