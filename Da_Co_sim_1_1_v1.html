<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Peek UI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d1a;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: Georgia, serif;
    position: relative;
  }

  /* Message area */
  #messageArea {
    position: absolute;
    top: 20px;
    left: 16px;
    right: 16px;
    bottom: 200px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 10px;
    overflow: hidden;
  }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .bubble.show { opacity: 1; transform: translateY(0); }
  .bubble.mateo {
    background: #f5c842;
    color: #1a1000;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .bubble.elodie {
    background: #7b2d8b;
    color: #ffd6f0;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .bubble .who {
    font-size: 9px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
    opacity: 0.6;
  }

  .typing {
    display: flex;
    gap: 4px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.07);
    border-radius: 18px;
    width: fit-content;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .typing.show { opacity: 1; }
  .typing.mateo { align-self: flex-start; }
  .typing.elodie { align-self: flex-end; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-5px); }
  }

  /* Character tray */
  #tray {
    position: absolute;
    bottom: 48px;
    left: 0;
    right: 0;
    height: 200px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    pointer-events: none;
  }

  .slot {
    width: 48%;
    height: 260px;
    position: relative;
    overflow: visible;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  .slot.peek { transform: translateY(60%); }
  .slot.pop  { transform: translateY(5%); }

  .slot img {
    height: 260px;
    width: auto;
    position: absolute;
    bottom: 0;
  }

  /* Mateo image is rotated 90deg CW — rotate back CCW */
  #mateoSlot img { transform: rotate(-90deg); transform-origin: center center; }
  /* Elodie image is rotated 90deg CCW — rotate back CW */
  #elodieSlot img { transform: rotate(90deg); transform-origin: center center; }

  /* Bottom bar */
  #bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: rgba(5,3,15,0.95);
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 20;
  }

  .btn {
    padding: 8px 22px;
    border-radius: 20px;
    border: none;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.5px;
    cursor: pointer;
  }
  .btn-m { background: linear-gradient(135deg,#f5c842,#d4a017); color:#1a1000; }
  .btn-e { background: linear-gradient(135deg,#c850f0,#7b2d8b); color:#fff; }
  .btn-r { background: rgba(255,255,255,0.08); color:rgba(255,255,255,0.4); border:1px solid rgba(255,255,255,0.1); }
</style>
</head>

<div id="bar">
  <button class="btn btn-m" onclick="trigger('mateo')">Mateo</button>
  <button class="btn btn-r" onclick="reset()">Reset</button>
  <button class="btn btn-e" onclick="trigger('elodie')">Elodie</button>
</div>

<script>
const lines = {
  mateo: ["hey. you actually showed up.", "i wasn't sure you would.", "...good. that's good."],
  elodie: ["Oh finally. I was starting to think you ghosted me.", "Rude, by the way. Very rude.", "Anyway. Hi. 💜"]
};
const idx = {mateo:0, elodie:0};
const locked = {mateo:false, elodie:false};
const state = {mateo:'hidden', elodie:'hidden'};

function setSlot(who, s) {
  const el = document.getElementById(who==='mateo'?'mateoSlot':'elodieSlot');
  el.classList.remove('peek','pop');
  if (s==='peek') el.classList.add('peek');
  if (s==='pop') el.classList.add('pop');
  state[who] = s;
}

function showTyping(who, ms) {
  const el = document.getElementById(who==='mateo'?'tmTyping':'elTyping');
  el.classList.add('show');
  return new Promise(r => setTimeout(()=>{el.classList.remove('show');r();}, ms));
}

function addMsg(text, who) {
  const area = document.getElementById('messageArea');
  const b = document.createElement('div');
  b.className = 'bubble ' + who;
  b.innerHTML = '<div class="who">'+(who==='mateo'?'Mateo':'Elodie')+'</div>'+text;
  const t = document.getElementById(who==='mateo'?'tmTyping':'elTyping');
  area.insertBefore(b, t);
  requestAnimationFrame(()=>b.classList.add('show'));
  const all = area.querySelectorAll('.bubble');
  if(all.length>6) all[0].remove();
}

const delay = ms => new Promise(r=>setTimeout(r,ms));

async function trigger(who) {
  if(locked[who]) return;
  locked[who] = true;
  if(state[who]==='hidden') { setSlot(who,'peek'); await delay(400); }
  setSlot(who,'pop');
  await showTyping(who, 900);
  if(idx[who] < lines[who].length) addMsg(lines[who][idx[who]++], who);
  await delay(700);
  setSlot(who,'peek');
  locked[who] = false;
}

function reset() {
  ['mateo','elodie'].forEach(w=>{setSlot(w,'hidden');idx[w]=0;locked[w]=false;});
  document.querySelectorAll('.bubble').forEach(b=>b.remove());
  document.getElementById('tmTyping').classList.remove('show');
  document.getElementById('elTyping').classList.remove('show');
}
</script>
